name: OverflowGuard CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Python tests + linting
  # ---------------------------------------------------------------------------
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cppcheck clang-tidy gcc g++ libclang-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install colorama libclang bandit pytest semgrep
          pip install tree-sitter \
            tree-sitter-c tree-sitter-cpp tree-sitter-python \
            tree-sitter-java tree-sitter-go tree-sitter-rust \
            tree-sitter-javascript tree-sitter-typescript \
            tree-sitter-php tree-sitter-ruby tree-sitter-c-sharp
          pip install z3-solver

      - name: Run pytest
        run: pytest tests/test_audit.py -v --tb=short

  # ---------------------------------------------------------------------------
  # 2. Static analysis on sample C/C++ files
  # ---------------------------------------------------------------------------
  static-analysis:
    name: cppcheck + clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-tidy gcc

      - name: cppcheck
        run: |
          cppcheck --enable=all --inconclusive --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --suppress=unusedFunction \
            samples/ 2>&1 | tee cppcheck-results.txt || true

      - name: Upload cppcheck results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-results
          path: cppcheck-results.txt

  # ---------------------------------------------------------------------------
  # 3. Bandit SAST on all Python files
  # ---------------------------------------------------------------------------
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.venv,./tests,./samples \
            -f txt -o bandit-results.txt || true
          cat bandit-results.txt

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.txt

  # ---------------------------------------------------------------------------
  # 4. Full OverflowGuard scan on samples/  (generate HTML report artifact)
  # ---------------------------------------------------------------------------
  full-scan:
    name: Full Scan (samples/)
    runs-on: ubuntu-latest
    needs: [ test ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cppcheck clang-tidy gcc g++ libclang-dev
          pip install colorama libclang bandit
          pip install tree-sitter \
            tree-sitter-c tree-sitter-cpp tree-sitter-python \
            tree-sitter-java tree-sitter-go tree-sitter-rust \
            tree-sitter-javascript tree-sitter-typescript \
            tree-sitter-php tree-sitter-ruby tree-sitter-c-sharp
          pip install z3-solver

      - name: Run OverflowGuard on samples/
        run: echo "samples" | python main.py

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overflow-guard-report
          path: results/
